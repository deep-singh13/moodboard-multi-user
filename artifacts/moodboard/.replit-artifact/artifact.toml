kind = "web"
previewPath = "/"
title = "Moodboard"
version = "1.0.0"
id = "artifacts/moodboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20658

[services.development]
run = "pnpm --filter @workspace/moodboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moodboard", "run", "build" ]
publicDir = "artifacts/moodboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20658"
BASE_PATH = "/"
