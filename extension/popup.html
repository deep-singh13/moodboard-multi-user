<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

<div id="app">

  <!-- ── Header ───────────────────────────────────── -->
  <header class="header">
    <div class="logo-mark">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
        <rect x="2"  y="2"  width="9" height="9" rx="2" fill="#111110"/>
        <rect x="13" y="2"  width="9" height="9" rx="2" fill="#111110"/>
        <rect x="2"  y="13" width="9" height="9" rx="2" fill="#111110"/>
        <rect x="13" y="13" width="9" height="9" rx="2" fill="#111110"/>
      </svg>
    </div>
    <span class="logo-text">Moodboard</span>
  </header>

  <!-- ── State: Loading ───────────────────────────── -->
  <div id="state-loading" class="state">
    <div class="loading-wrap">
      <div class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <p class="loading-text">Fetching page info…</p>
    </div>
  </div>

  <!-- ── State: Can't save (browser page) ─────────── -->
  <div id="state-no-page" class="state">
    <div class="no-page-wrap">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
      </svg>
      <p class="no-page-text">Navigate to a webpage to save it to your moodboard.</p>
    </div>
  </div>

  <!-- ── State: Ready ─────────────────────────────── -->
  <div id="state-ready" class="state">

    <!-- Thumbnail -->
    <div class="thumb-wrap">
      <img id="thumb" src="" alt="" class="thumb" />
      <div id="thumb-placeholder" class="thumb-placeholder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2A2A28" strokeWidth="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </div>
      <span id="type-badge" class="type-badge"></span>
    </div>

    <!-- Form -->
    <div class="form">
      <div class="field">
        <label class="label" for="title-input">Title</label>
        <input id="title-input" class="input" type="text" placeholder="Page title" />
      </div>
      <div class="field">
        <label class="label" for="note-input">
          Note <span class="optional">optional</span>
        </label>
        <textarea
          id="note-input"
          class="textarea"
          placeholder="Add a personal note…"
          maxlength="300"
          rows="2"
        ></textarea>
      </div>
      <p id="save-error" class="save-error"></p>
      <button id="save-btn" class="save-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Save to Moodboard
      </button>
    </div>

  </div>

  <!-- ── State: Success ───────────────────────────── -->
  <div id="state-success" class="state">
    <div class="success-wrap">
      <div class="success-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <p class="success-title">Saved!</p>
      <p class="success-sub">Added to your moodboard</p>
      <a id="open-link" href="https://moodboard-zyji.onrender.com" target="_blank" class="open-link">
        Open Moodboard →
      </a>
    </div>
  </div>

  <!-- ── State: Error ─────────────────────────────── -->
  <div id="state-error" class="state">
    <div class="error-wrap">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
      </svg>
      <p id="error-text" class="error-text"></p>
      <button id="retry-btn" class="retry-btn">Try again</button>
    </div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
